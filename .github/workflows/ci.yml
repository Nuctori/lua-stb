name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua_version: ["5.3", "5.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config lua${{ matrix.lua_version }} liblua${{ matrix.lua_version }}-dev

      - name: Build
        run: make LUA_VERSION=${{ matrix.lua_version }} LUA_BIN=lua${{ matrix.lua_version }} build

      - name: Test
        run: make LUA_VERSION=${{ matrix.lua_version }} LUA_BIN=lua${{ matrix.lua_version }} test
